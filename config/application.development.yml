app:
  env: development
  port: 3000
  # apiPrefix: /multi-service-aggregator

mysql:
  host: 127.0.0.1
  port: 3306
  username: root
  password: root
  database: multi-dev
  synchronize: true
  logging: true

redis:
  host: 127.0.0.1
